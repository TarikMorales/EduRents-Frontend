<div class="container mt-5">
  <h3 class="mb-4">Historial de Transacciones (Vendedor)</h3>

  <div *ngIf="transacciones.length === 0">No se encontraron transacciones.</div>

  <div class="card mb-3" *ngFor="let t of transacciones">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h5>Producto #{{ t.idProducto }}</h5>
          <p>
            Método: {{ t.metodoPago }} |
            <span [ngClass]="getEstadoColor(t.estado)">
              Estado: {{ t.estado }}
            </span>
          </p>
          <p>Precio: <strong>S/ {{ t.precio }}</strong></p>
          <p>Fecha: {{ t.fechaCreacion | date: 'mediumDate' }}</p>
        </div>
        <div>
          <!-- Aquí no van botones para confirmar ni cancelar -->
          <span class="badge bg-secondary">Transacción de cliente</span>
        </div>
      </div>
    </div>
  </div>

  <div class="text-center mt-4">
    <a routerLink="/" class="btn btn-outline-danger">← Volver al inicio</a>
  </div>
</div>
