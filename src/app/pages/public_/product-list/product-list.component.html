<body>
<div class="container">
  <div class="p-4 d-flex align-items-center justify-content-center gap-3 search-box w-100">

    <!-- Input que se ajusta al espacio disponible -->
    <input
      type="text"
      placeholder="Ingrese producto"
      class="form-control search-input flex-grow-1"
    />

    <div #contenedorFiltros class="position-relative d-inline-block">
      <!-- Botón -->
      <button class="search-filter-button" (click)="alternarFiltros()">Filtros</button>

      <!-- Ventana de filtros flotante -->
      <div
        *ngIf="mostrarFiltros"
        class="bg-white border rounded shadow p-3 mt-2 position-absolute z-3 end-0"
        style="min-width: 300px"
      >
        <app-filter-product-list
          (filtrosAplicados)="filtrarProductos($event)"
        ></app-filter-product-list>
      </div>
    </div>
  </div>
  <div class="p-4 d-flex align-items-center gap-2">

    <!-- Botón desplegable de orden -->
    <div class="dropdown">
      <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
        Ordenar por
      </button>
      <ul class="dropdown-menu">
        <li><button class="dropdown-item" (click)="cambiarOrden('vistas')">Vistas</button></li>
      </ul>
    </div>

    <!-- Botón que muestra el orden activo y permite quitarlo -->
    <button
      *ngIf="ordenSeleccionado"
      class="btn btn-sm btn-outline-danger d-flex align-items-center gap-1"
      (click)="quitarOrden()"
    >
      {{ ordenSeleccionado | titlecase }} ✕
    </button>

    <!-- Botón para limpiar filtros -->
    <button
      *ngIf="tieneFiltrosActivos()"
      class="btn btn-sm btn-outline-primary"
      (click)="limpiarFiltros()"
    >
      Limpiar filtros
    </button>

  </div>
</div>
<div class="container mt-4">
  <div class="d-flex flex-wrap gap-5 justify-content-center">
    <app-product-card  *ngFor="let producto of productos" [producto]="producto">
    </app-product-card>
  </div>
</div>
</body>
