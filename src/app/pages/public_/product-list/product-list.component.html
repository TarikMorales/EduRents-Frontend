<body>
<div class="container">
  <div class="p-4 d-flex align-items-center justify-content-center gap-3 search-box w-100">

    <!-- Input que se ajusta al espacio disponible -->
    <input
      type="text"
      placeholder="Ingrese producto"
      class="form-control search-input flex-grow-1"
    />

    <div class="position-relative d-inline-block">
      <!-- Botón -->
      <button class="search-filter-button" (click)="alternarFiltros()">Filtros</button>

      <!-- Ventana de filtros flotante -->
      <div
        *ngIf="mostrarFiltros"
        class="bg-white border rounded shadow p-3 mt-2 position-absolute z-3 end-0"
        style="min-width: 300px"
      >
        <app-filter-product-list
          (filtrosAplicados)="filtrarProductos($event)"
        ></app-filter-product-list>
      </div>
    </div>
  </div>
</div>
<div class="container mt-4">
  <div class="d-flex flex-wrap gap-5 justify-content-center">
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
    <app-product-card></app-product-card>
  </div>
</div>
</body>
