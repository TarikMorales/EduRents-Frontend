  <body>
    <div class="d-flex flex-column bg-white justify-content-center align-items-center" style="height: 365px; width: 279px; border-radius: 10px">
      <div class="w-100" style="height: 222px">
        <img src="" alt="Imagen del producto" style="height: 100%; width: 100%; object-fit: cover">
      </div>
      <hr class="my-2 w-100">
      <div class="d-flex flex-column w-100">
        <div class="d-flex justify-content-between align-items-center px-1 mb-3">
          <h5 class="mb-0" style="font-size: 20px">{{ producto.nombre }}</h5>
          <p class="mb-0" style="font-size: 20px">S/. {{ producto.precio | number:'1.2-2' }}</p>
        </div>
        <div class="d-flex flex-column px-1" style="font-weight: bolder;">
          <p style="font-weight: bolder; font-size: 14px">
            {{ producto.acepta_intercambio ? 'Intercambio disponible' : 'No acepta intercambio' }}
          </p>
          <div class="d-flex flex-row" style="gap: 3px">
            <h6 style="font-weight: bolder; font-size: 14px">Publicado por:</h6>
            <h6 style="font-weight: bolder; font-size: 14px">{{ producto.vendedor?.usuario?.nombres || 'Anónimo' }}</h6>
          </div>
        </div>
      </div>
    </div>
  </body>
