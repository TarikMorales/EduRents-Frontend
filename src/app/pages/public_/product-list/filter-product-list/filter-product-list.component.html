<body>
<div class="d-flex flex-column bg-white p-3" style="height: 660px; width: 551px; border-radius: 5px">

  <!-- Sección: Tipo -->
  <div>
    <p style="font-size: 16px; font-weight: 600">Tipo:</p>
    <div class="row">
      <div class="col-4 mb-2" *ngFor="let categoria of categorias">
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            [value]="categoria.id"
            (change)="onCheckboxChange($event)"
            [checked]="filtrosSeleccionados.includes(categoria.id)"
            [id]="categoria.nombre"
          />
          <label class="form-check-label" [for]="categoria.nombre">{{ categoria.nombre }}</label>
        </div>
      </div>
    </div>
  </div>

  <!-- Sección: Carreras -->
  <div class="mt-3">
    <p style="font-size: 16px; font-weight: 600">Carrera:</p>
    <div class="row">
      <div class="col-4 mb-2" *ngFor="let carrera of carreras">
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            [value]="carrera.id"
            (change)="onCarreraChange($event)"
            [checked]="carrerasSeleccionadas.includes(carrera.id)"
            [id]="carrera.nombre"
          />
          <label class="form-check-label" [for]="carrera.nombre">{{ carrera.nombre }}</label>
        </div>
      </div>
    </div>
  </div>
  <!-- Sección: Estado del producto -->
  <div class="mt-3">
    <p style="font-size: 16px; font-weight: 600">Estado del producto:</p>
    <div class="row">
      <div class="col-3 mb-2" *ngFor="let estado of estadosDisponibles">
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            [value]="estado"
            (change)="onEstadoChange($event)"
            [checked]="estadosSeleccionados.includes(estado)"
            [id]="estado"
          />
          <label class="form-check-label" [for]="estado">{{ estado }}</label>
        </div>
      </div>
    </div>
  </div>
  <div class="mt-3">
    <p style="font-size: 16px; font-weight: 600">Precio:</p>

    <div class="row">
      <!-- Columna: Mínimo -->
      <div class="col d-flex flex-row gap-3">
        <label for="minPrecio" class="mb-1" style="font-weight: bolder">Mínimo:</label>
        <input
          type="number"
          id="minPrecio"
          class="form-control"
          [(ngModel)]="precioMin"
          placeholder="S./0"
          style="width: 125px; height: 24px"
        />
      </div>

      <!-- Columna: Máximo -->
      <div class="col d-flex flex-row gap-3">
        <label for="maxPrecio" class="mb-1" style="font-weight: bolder">Máximo:</label>
        <input
          type="number"
          id="maxPrecio"
          class="form-control"
          [(ngModel)]="precioMax"
          placeholder="S/.100"
          style="width: 125px; height: 24px"
        />
      </div>
    </div>
  </div>
  <!-- Botón que despliega la columna -->
  <div class="mt-3 position-relative">
    <p style="font-size: 16px; font-weight: 600">Curso:</p>
    <button
      class="btn btn-outline-primary w-50 text-start"
      style="border-radius: 4px; border: 1px #BDBDBD solid;"
      (click)="toggleCursos()"
      [disabled]="carrerasSeleccionadas.length === 0"
    >
      Seleccionar cursos
    </button>

    <!-- Columna desplegable de cursos -->
    <div
      class="position-absolute bg-white border mt-1 p-2 rounded shadow"
      style="z-index: 10; max-height: 300px; overflow-y: auto; width: 100%"
      *ngIf="mostrarCursosDropdown"
    >
      <!-- Buscador -->
      <input
        type="text"
        class="form-control mb-2"
        placeholder="Buscar curso..."
        [(ngModel)]="busquedaCurso"
      />

      <!-- Lista de cursos como botones -->
      <div class="d-flex flex-column gap-2">
        <button
          type="button"
          class="btn curso-btn text-start w-100"
          style="border: none;"
          *ngFor="let curso of cursosFiltrados()"
          (click)="toggleCurso(curso)"
        >
          {{ curso.nombre }}
        </button>
      </div>
    </div>
  </div>
  <div class="mt-4 d-flex justify-content-end">
    <button class="btn btn-primary" (click)="aplicarFiltros()">Aplicar filtros</button>
  </div>
</div>
</body>
