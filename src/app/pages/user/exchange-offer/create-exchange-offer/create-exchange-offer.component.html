<app-navbar></app-navbar>
<div class="container mt-5" style="margin-bottom: 10rem;">
  <h3 class="mb-4">Proponer Intercambio</h3>

  <div class="container-fluid contenedor-producto">
    <div class="row align-items-center">

      <div class="col-6 contenedor-producto-card">

        <div class="container-fluid">
          <div class="row justify-content-center align-items-center">

            <div class="col-6">
              <div class="container-fluid">
                <div class="row justify-content-center align-items-center">
                  <div class="col-12 mb-2">
                    <span>{{ producto.nombre }}</span>
                  </div>
                  <div class="col-12">
                    <p class="text-muted">{{ producto.descripcion }}</p>
                  </div>
                  <div class="col-12">
                    <span class="text-muted"><strong>Por:</strong> {{ producto.vendedor.nombreNegocio }}</span>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-6 text-center" *ngIf="producto && producto.imagenes && producto.imagenes.length > 0">
              <img [src]="producto.imagenes[0].url" alt="imagen-producto" class="img-fluid img-producto">
            </div>

          </div>
        </div>

      </div>

    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="enviarPropuesta()">
    <div class="mb-3">
      <label for="mensaje" class="form-label">Mensaje de propuesta</label>
      <textarea
        id="mensaje"
        class="form-control"
        rows="5"
        formControlName="mensaje_propuesta"
        placeholder="Escribe tu mensaje aquí..."
      ></textarea>
      <div *ngIf="form.get('mensaje_propuesta')?.invalid && form.get('mensaje_propuesta')?.touched" class="text-danger">
        El mensaje es obligatorio y no puede exceder los 500 caracteres.
      </div>
    </div>

    <button type="submit" class="btn btn-primary me-3" [disabled]="form.invalid">Enviar propuesta</button>
    <button type="button" class="btn btn-outline-secondary" (click)="goBack()">Cancelar</button>
  </form>
</div>
<app-footer></app-footer>
