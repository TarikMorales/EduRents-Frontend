<div class="container mt-5">
  <h3 class="mb-4">Pago por Banca</h3>

  <form [formGroup]="bancaForm" (ngSubmit)="submit()">
    <div class="mb-3">
      <label class="form-label">Selecciona tu banco</label>
      <select class="form-select" formControlName="banco" title="Selecciona tu banco">
        <option value="" disabled selected>-- Selecciona un banco --</option>
        <option *ngFor="let banco of bancos" [value]="banco">{{ banco }}</option>
      </select>
      <div class="text-danger mt-1" *ngIf="bancaForm.get('banco')?.invalid && bancaForm.get('banco')?.touched">
        Debes seleccionar un banco.
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Número de cuenta</label>
      <input
        type="text"
        class="form-control"
        formControlName="numeroCuenta"
        placeholder="Ej. 123456789012"
      />
      <div class="text-danger mt-1" *ngIf="bancaForm.get('numeroCuenta')?.invalid && bancaForm.get('numeroCuenta')?.touched">
        Número inválido (10-20 dígitos).
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Titular de la cuenta</label>
      <input
        type="text"
        class="form-control"
        formControlName="titular"
        placeholder="Nombre completo"
      />
      <div class="text-danger mt-1" *ngIf="bancaForm.get('titular')?.invalid && bancaForm.get('titular')?.touched">
        Nombre del titular requerido.
      </div>
    </div>

    <div class="form-check mb-3">
      <input type="checkbox" class="form-check-input" id="terminos" formControlName="aceptaTerminos" />
      <label class="form-check-label" for="terminos">
        Acepto los términos y condiciones del pago bancario
      </label>
      <div class="text-danger mt-1" *ngIf="bancaForm.get('aceptaTerminos')?.invalid && bancaForm.get('aceptaTerminos')?.touched">
        Debes aceptar los términos.
      </div>
    </div>

    <div class="d-flex justify-content-between mt-4">
      <button type="button" class="btn btn-secondary" (click)="volver()">Atrás</button>
      <button type="submit" class="btn btn-danger" [disabled]="bancaForm.invalid">Pagar</button>
    </div>
  </form>
</div>
