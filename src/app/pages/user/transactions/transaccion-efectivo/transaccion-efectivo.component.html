<app-navbar></app-navbar>

<div class="container text-center" style="margin-top: 5rem; margin-bottom: 10rem;">
  <img src="assets/check-success.png" alt="Pago exitoso" width="100" class="mb-3" />

  <h2 class="text-danger fw-bold">¡Estás a un solo paso!</h2>
  <p class="lead mt-3">
    El vendedor ha sido notificado de tu pago en efectivo. Recibirás el producto y luego podrás realizar el pago.
  </p>

  <!-- Acciones -->
  <div class="d-grid gap-3 mt-4">
    <div class="row justify-content-center">
      <div class="col-md-5 mb-2">
        <button class="btn btn-success w-100" (click)="confirmarPago()" [disabled]="haConfirmadoPago">Confirmar pago</button>
      </div>
      <div class="col-md-5 mb-2">
        <button class="btn btn-secondary w-100" (click)="irAConfirmarPagos()" [disabled]="haConfirmadoPago">Ir a confirmar pagos</button>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-md-5 mb-2">
        <button class="btn btn-outline-danger w-100" (click)="cancelarPago()" [disabled]="haConfirmadoPago">Cancelar transacción</button>
      </div>
      <div class="col-md-5 mb-2">
        <button class="btn btn-outline-warning w-100" (click)="reclamarEntrega()" [disabled]="haHechoReclamo">Reclamar entrega</button>
      </div>
    </div>
  </div>

  <!-- Mostrar motivo si se viene de un reclamo -->
  <div *ngIf="motivoReclamo" class="alert alert-warning mt-4 text-start">
    <strong>Motivo del reclamo:</strong>
    <p class="mb-0">{{ motivoReclamo }}</p>
  </div>

  <button class="btn btn-link mt-4 text-danger" (click)="volver()">← Volver</button>
</div>

<app-footer></app-footer>
