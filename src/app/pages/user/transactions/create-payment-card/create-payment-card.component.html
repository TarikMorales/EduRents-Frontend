<app-navbar></app-navbar>

<div class="container mt-5">
  <h3 class="mb-4 text-center">Coloque la información de pago de su tarjeta</h3>

  <form [formGroup]="paymentForm" (ngSubmit)="submitPayment()">
    <!-- Número de tarjeta -->
    <div class="mb-3">
      <label class="form-label" for="cardNumber">Información de la tarjeta</label>
      <input
        type="text"
        id="cardNumber"
        class="form-control"
        formControlName="cardNumber"
        placeholder="1234123412341234"
        title="Número de tarjeta"
      >
      <div *ngIf="paymentForm.get('cardNumber')?.touched && paymentForm.get('cardNumber')?.invalid" class="text-danger mt-1">
        <small *ngIf="paymentForm.get('cardNumber')?.errors?.['required']">Este campo es obligatorio.</small>
        <small *ngIf="paymentForm.get('cardNumber')?.errors?.['pattern']">Debe contener exactamente 16 dígitos.</small>
      </div>
    </div>

    <!-- Expiración y CVC -->
    <div class="row mb-3">
      <div class="col">
        <label class="form-label" for="expiry">MM/AA</label>
        <input
          type="text"
          id="expiry"
          class="form-control"
          formControlName="expiry"
          placeholder="MM/AA"
          title="Fecha de expiración"
        >
        <div *ngIf="paymentForm.get('expiry')?.touched && paymentForm.get('expiry')?.invalid" class="text-danger mt-1">
          <small *ngIf="paymentForm.get('expiry')?.errors?.['required']">Requerido.</small>
          <small *ngIf="paymentForm.get('expiry')?.errors?.['pattern']">Formato inválido (MM/AA).</small>
        </div>
      </div>
      <div class="col">
        <label class="form-label" for="cvc">CVC</label>
        <input
          type="text"
          id="cvc"
          class="form-control"
          formControlName="cvc"
          placeholder="CVC"
          title="Código de seguridad"
        >
        <div *ngIf="paymentForm.get('cvc')?.touched && paymentForm.get('cvc')?.invalid" class="text-danger mt-1">
          <small *ngIf="paymentForm.get('cvc')?.errors?.['required']">Requerido.</small>
          <small *ngIf="paymentForm.get('cvc')?.errors?.['pattern']">Debe ser un número de 3 dígitos.</small>
        </div>
      </div>
    </div>

    <!-- Nombre completo -->
    <div class="mb-3">
      <label class="form-label" for="fullName">Nombre completo</label>
      <input
        type="text"
        id="fullName"
        class="form-control"
        formControlName="fullName"
        title="Nombre del titular"
      >
      <div *ngIf="paymentForm.get('fullName')?.touched && paymentForm.get('fullName')?.invalid" class="text-danger mt-1">
        <small *ngIf="paymentForm.get('fullName')?.errors?.['required']">Campo obligatorio.</small>
      </div>
    </div>

    <!-- País o región -->
    <div class="mb-3">
      <label class="form-label" for="country">País o región</label>
      <select
        id="country"
        class="form-select"
        formControlName="country"
        title="País de residencia"
      >
        <option value="Perú">Perú</option>
      </select>
      <div *ngIf="paymentForm.get('country')?.touched && paymentForm.get('country')?.invalid" class="text-danger mt-1">
        <small *ngIf="paymentForm.get('country')?.errors?.['required']">Selecciona un país.</small>
      </div>
    </div>

    <!-- Código postal -->
    <div class="mb-3">
      <label class="form-label" for="postalCode">Código postal</label>
      <input
        type="text"
        id="postalCode"
        class="form-control"
        formControlName="postalCode"
        placeholder="Ej: 15001"
        title="Código postal"
      >
      <div *ngIf="paymentForm.get('postalCode')?.touched && paymentForm.get('postalCode')?.invalid" class="text-danger mt-1">
        <small *ngIf="paymentForm.get('postalCode')?.errors?.['required']">Campo obligatorio.</small>
      </div>
    </div>

    <!-- Botones -->
    <div class="d-flex justify-content-between">
      <button type="button" class="btn btn-outline-danger" (click)="goBack()">← Atrás</button>
      <button type="submit" class="btn btn-danger" [disabled]="paymentForm.invalid">Pagar</button>
    </div>
  </form>
</div>

<app-footer></app-footer>
