<app-navbar></app-navbar>

<div class="container mt-5">
  <h3 class="mb-4">Google Pay</h3>
  <p>Ingresa tu correo de Google asociado a tu cuenta:</p>

  <form [formGroup]="googleForm" (ngSubmit)="submit()">
    <div class="mb-3">
      <label class="form-label">Correo de Google</label>
      <input
        type="email"
        class="form-control"
        formControlName="correo"
        placeholder="ejemplo@gmail.com"
      />
      <div class="text-danger mt-1" *ngIf="googleForm.get('correo')?.invalid && googleForm.get('correo')?.touched">
        Correo inválido
      </div>
    </div>

    <div class="d-flex justify-content-between mt-4">
      <button class="btn btn-secondary" type="button" (click)="volver()">Atrás</button>
      <button class="btn btn-danger" type="submit" [disabled]="googleForm.invalid">Pagar</button>
    </div>
  </form>
</div>

<app-footer></app-footer>
