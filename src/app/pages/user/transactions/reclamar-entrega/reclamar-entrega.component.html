<app-navbar></app-navbar>

<div class="container mt-5">
  <h3 class="mb-4 text-danger">Reclamar entrega</h3>
  <p class="text-muted">Describe el motivo de tu reclamo. Nos aseguraremos de revisarlo lo antes posible.</p>

  <form (ngSubmit)="enviarReclamo()" [formGroup]="reclamoForm" class="mt-3">
    <div class="mb-3">
      <label for="motivo" class="form-label">Motivo del reclamo</label>
      <textarea 
        id="motivo"
        class="form-control"
        formControlName="motivo"
        rows="5"
        placeholder="Escribe aquí tu motivo..."
        required></textarea>

      <div class="text-danger mt-1" *ngIf="reclamoForm.get('motivo')?.invalid && reclamoForm.get('motivo')?.touched">
        El motivo debe tener al menos 10 caracteres.
      </div>
    </div>

    <div class="d-flex gap-2">
      <button 
        class="btn btn-danger" 
        type="submit"
        [disabled]="reclamoForm.invalid">
        Enviar reclamo
      </button>

      <button 
        class="btn btn-outline-danger" 
        type="button"
        (click)="volver()">
        Cancelar
      </button>
    </div>
  </form>
</div>

<app-footer></app-footer>
